name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # or master, depending on your default branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: karthigadevi-18  # hardcoded username (lowercase)
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ghcr.io/karthigadevi-18/myapp:latest .

      - name: Push Docker image
        run: docker push ghcr.io/karthigadevi-18/myapp:latest
